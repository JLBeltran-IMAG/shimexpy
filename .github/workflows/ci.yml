name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install linting tools
        run: pip install black isort flake8

      - name: Check formatting with black
        run: black --check shimexpy/ shimexpy_cli/ shimexpy_gui/

      - name: Check import sorting with isort
        run: isort --check-only --profile black shimexpy/ shimexpy_cli/ shimexpy_gui/

      - name: Lint with flake8
        run: flake8 shimexpy/ shimexpy_cli/ shimexpy_gui/ --max-line-length=88 --extend-ignore=E203,E501,W503

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          cd shimexpy
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --ignore=tests/test_integration_baseline.py
